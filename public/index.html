<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoCandidIt</title>

    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    
    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="assets/vendor/quill/quill.snow.css">

    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    
    <!-- Likely not needed -->
    <!-- <link rel="stylesheet" href="assets/css/style.css"> -->
</head>
<body class="bg-body-tertiary">

    <!-- navbar -->
    <nav class="navbar navbar-light bg-light border-bottom sticky-top">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                
                <button class="btn btn-outline" type="button" data-bs-toggle="offcanvas" data-bs-target="#vaultSidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <button class="btn btn-outline" type="button" onclick="goHome()" title="Go to Dashboard">
                    <i class="fa-solid fa-house"></i>
                </button>
            </div>
            <a class="navbar-brand d-flex align-items-center">
            <img src="assets/img/logo.png" alt="GoCandidIt Logo" height="45" class="d-inline-block align-text-top me-2">
        </a>
        <button id="btnLogout" class="btn btn-outline-danger d-none" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- login/register -->
        <div id="section-auth" class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 id="auth-title" class="text-center mb-4">Login</h3>
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" id="txtEmail" class="form-control" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="txtPassword" class="form-control">
                        </div>
                        <div id="divConfirmPassword" class="mb-3 d-none">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" id="txtConfirmPassword" class="form-control">
                        </div>
                        <div class="d-grid gap-2">
                            <button id="btnPrimaryAuth" class="btn btn-primary" onclick="handleAuth()">Login</button>
                            <button class="btn btn-link btn-sm" id="btnToggleAuth" onclick="toggleAuthMode()">Need an account? Register</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="section-vault" class="row d-none">
            
            <div class="offcanvas offcanvas-start bg-primary text-white" tabindex="-1" id="vaultSidebar" style="width: 280px;">
                <div class="offcanvas-header border-bottom border-secondary">
                    <h5 class="offcanvas-title">Vault Navigation</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body p-0">
                    <div class="list-group list-group-flush">
                        <button class="list-group-item list-group-item-action bg-primary text-white border-secondary py-3" onclick="switchTab('profile')">
                            <i class="fas fa-user-circle me-2"></i> Personal Profile
                        </button>
                        <button class="list-group-item list-group-item-action bg-primary text-white border-secondary py-3" onclick="switchTab('jobs')">
                            <i class="fas fa-briefcase me-2"></i> Work History
                        </button>
                        <button class="list-group-item list-group-item-action bg-primary text-white border-secondary py-3" onclick="switchTab('education')">
                            <i class="fas fa-graduation-cap me-2"></i> Education
                        </button>
                        <button class="list-group-item list-group-item-action bg-primary text-white border-secondary py-3" onclick="switchTab('projects')">
                            <i class="fas fa-code me-2"></i> Projects
                        </button>
                    </div>
                </div>
            </div>

            <main class="col-12 col-lg-10 offset-lg-1">
                <div id="vault-content-area" class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div id="view-welcome">
                            <h2 class="h4">Welcome to your Resume Vault</h2>
                            <p class="text-muted">Select a category from the menu to start organizing your professional history.</p>
                            <div class="row g-3 mt-3">
                                <div class="col-6 col-md-3">
                                    <div class="btn btn-light w-100 h-100 py-3 shadow-sm d-flex flex-column align-items-center" role="button" onclick="switchTab('profile')">
                                        <h5 class="fs-5 fw-bold"><i class="fas fa-user-circle fa-md mb-2 text-success"></i> Profile</h5>
                                    </div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="btn btn-light w-100 h-100 py-3 shadow-sm d-flex flex-column align-items-center" role="button" onclick="switchTab('jobs')">
                                        <h5 class="fs-5 fw-bold"><i class="fas fa-briefcase fa-md mb-2 text-success"></i> Jobs</h5>
                                    </div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="btn btn-light w-100 h-100 py-3 shadow-sm d-flex flex-column align-items-center" role="button" onclick="switchTab('education')">
                                        <h5 class="fs-5 fw-bold"><i class="fas fa-graduation-cap fa-md mb-2 text-success"></i> Education</h5>
                                    </div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="btn btn-light w-100 h-100 py-3 shadow-sm d-flex flex-column align-items-center" role="button" onclick="switchTab('projects')">
                                        <h5 class="fs-5 fw-bold"><i class="fas fa-code fa-md mb-2 text-success"></i> Projects</h5>
                                    </div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <button class="btn btn-light w-100 h-100 py-3 shadow-sm d-flex flex-column align-items-center" role="button" onclick="switchTab('generate')">
                                        <h5 class="fs-5 fw-bold"><i class="fas fa-magic-wand-sparkles fa-md mb-2 text-success"></i> Tailor Resume</h5>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div id="view-editor" class="d-none">
                            <h2 id="view-title" class="h4 mb-0">Work Experience</h2>
                            <hr>
                            <div id="divDynamicFormFields" class="mb-3">
                                <!-- Probably replace this with another default view later -->
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label">Company</label><input type="text" id="jobCompany" class="form-control" placeholder="e.g. Google"></div>
                                    <div class="col-md-6"><label class="form-label">Role</label><input type="text" id="jobRole" class="form-control" placeholder="e.g. Software Engineer"></div>
                                    <div class="col-md-6"><label class="form-label">Location</label><input type="text" id="jobLocation" class="form-control" placeholder="City, State"></div>
                                    <div class="col-md-6"><label class="form-label">Dates</label><input type="text" id="jobDate" class="form-control" placeholder="Month Year - Month Year"></div>
                                </div>    
                            </div>
                            <div class="mb-3">
                                <label id="lblEditor" class="form-label">Additional Details & Achievements</label>
                                <div id="editor" style="height: 250px;"></div>
                            </div>
                            <div class="d-flex justify-content-between align-items-end flex-wrap gap-3">
                                <div id="divEditorActions"></div>
                                <button class="btn btn-success px-5" onclick="saveToVault()"><i class="fa-solid fa-floppy-disk me-2"></i>Save to Vault</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/quill/quill.js"></script>

    <script src="assets/js/app.js"></script>
</body>
</html>
